      <stop offset="1" stop-color="#131F2F"/>
    </linearGradient>
    <radialGradient id="glowA" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(218 146) rotate(28.7) scale(286 216)">
